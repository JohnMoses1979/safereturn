# ─── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/safe_return?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# ─── Twilio ──────────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}
twilio.mock=${TWILIO_MOCK:false}

# ─── Logging ─────────────────────────────────────────────────────────────
logging.level.com.safereturn=INFO
logging.level.org.springframework.security=WARN

# ─── Uploads ─────────────────────────────────────────────────────────────
safereturn.upload-dir=uploads

# ─── Face Recognition Service ────────────────────────────────────────────
face.api.url=${FACE_API_URL:http://localhost:8000}

# ─── File Upload ─────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── Groq AI ─────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
groq.max-tokens=600
groq.temperature=0.35

# ─── Police Seeder ───────────────────────────────────────────────────────
safereturn.seed.enabled=true

safereturn.seed.police[0].full-name=${POLICE_NAME}
safereturn.seed.police[0].phone=${POLICE_PHONE}
safereturn.seed.police[0].email=${POLICE_EMAIL}
safereturn.seed.police[0].password=${POLICE_PASSWORD}
